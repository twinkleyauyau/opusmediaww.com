<title>Redirecting | Opus Media</title>
<script>
// ── URL Redirect Map ──
// Old Wix URLs → New GitHub Pages URLs
const redirects = {
  '/home':                          '/',
  '/career':                        '/joinus',
  '/careers':                       '/joinus',
  '/join-us':                       '/joinus',
  '/contact-us':                    '/contactus',
  '/contact':                       '/contactus',
  '/our-services':                  '/#services',
  '/intergrated-media-solution':    '/services/integrated-media',
  '/integrated-media-solution':     '/services/integrated-media',
  '/e-commerce-performance-driver': '/services/ecommerce',
  '/e-commerce':                    '/services/ecommerce',
  '/creative-communication-services': '/services/creative',
  '/creative':                      '/services/creative',
  '/web-architecture-optimization': '/services/web',
  '/web-architecture-optimisation': '/services/web',
  '/social-curation-amplification-1': '/services/social',
  '/social-curation-amplification':   '/services/social',
  '/social':                        '/services/social',
  '/multi-markets-digital-enablers':  '/services/multimarket',
  '/multi-market':                  '/services/multimarket',
};

(function() {
  const path = window.location.pathname.toLowerCase().replace(/\/$/, '') || '/';
  const destination = redirects[path];

  if (destination) {
    // 301-style redirect
    window.location.replace(destination);
  }
  // If no match found, show the 404 page below
})();
</script>
