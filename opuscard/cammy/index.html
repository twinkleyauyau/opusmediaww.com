<style>
  :root{
    --crimson:#5C1A1A;
    --offwhite:#EDE8DD;
    --ink:#141414;
    --bg:#1d1a17;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{min-height:100%}
  body{
    font-family:'DM Sans',sans-serif;background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    padding:max(24px, env(safe-area-inset-top)) 18px max(32px, env(safe-area-inset-bottom));
  }

  .ticket{
    width:100%;max-width:400px;
    animation:drop .7s cubic-bezier(.2,.9,.3,1.15);
  }
  @keyframes drop{from{opacity:0;transform:translateY(-40px) rotate(-2deg)}to{opacity:1;transform:none}}

  /* ---- top piece: header + details ---- */
  .piece-top{
    background:var(--offwhite);color:var(--ink);
    border-radius:18px 18px 0 0;overflow:hidden;
    position:relative;z-index:2;
  }
  .head{
    background:var(--crimson);color:var(--offwhite);
    padding:16px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px;
  }
  .head img{height:24px;width:auto;max-width:60%;object-fit:contain;display:block}
  .head .r{font-family:'Space Mono',monospace;font-size:11px;opacity:.85;white-space:nowrap}

  .main{padding:26px 24px 20px}
  .lbl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;color:#8a8177;margin-bottom:4px}
  .name{font-family:'Anton',sans-serif;font-size:clamp(34px,9vw,44px);text-transform:uppercase;line-height:1;color:var(--crimson)}
  .title{margin-top:7px;font-size:14px;font-weight:500}
  .stack{display:flex;flex-direction:column;gap:16px;margin-top:22px}
  .val{font-size:13px;font-weight:700}
  .val a{color:var(--ink);text-decoration:none;word-break:break-all}
  .addr{margin-top:16px;padding-bottom:4px}
  .addr .val{font-weight:700;font-size:12.5px;line-height:1.5;color:var(--ink)}

  /* ---- perforation: belongs to the top piece ---- */
  .perf{
    position:relative;background:var(--offwhite);height:14px;
    border-bottom:2px dashed #b9b0a3;
  }
  .perf::before,.perf::after{
    content:'';position:absolute;bottom:-12px;width:22px;height:22px;border-radius:50%;
    background:var(--bg);z-index:3;
  }
  .perf::before{left:-11px}
  .perf::after{right:-11px}

  /* ---- stub: separate piece of paper ---- */
  .stub{
    background:var(--offwhite);color:var(--ink);
    border-radius:0 0 18px 18px;
    box-shadow:0 18px 44px rgba(0,0,0,.45);
    padding:22px 24px 22px;display:flex;flex-direction:column;gap:16px;
    position:relative;z-index:1;
    transform-origin:top left;
  }
  .stub::before,.stub::after{
    content:'';position:absolute;top:-11px;width:22px;height:22px;border-radius:50%;
    background:var(--bg);z-index:2;
  }
  .stub::before{left:-11px}
  .stub::after{right:-11px}
  .stub.torn{animation:tearOff .6s cubic-bezier(.3,.8,.4,1) forwards}
  @keyframes tearOff{
    0%{transform:none}
    25%{transform:translate(2px,3px) rotate(.7deg)}
    55%{transform:translate(-2px,12px) rotate(-1.8deg)}
    100%{transform:translateY(9px) rotate(-1.3deg)}
  }

  .btnrow{display:flex;flex-wrap:wrap;gap:9px}
  .act{
    display:inline-flex;align-items:center;justify-content:center;gap:7px;
    font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
    padding:12px 18px;border-radius:999px;border:none;cursor:pointer;
    text-decoration:none;transition:transform .15s;
  }
  .act:active{transform:scale(.95)}
  .act.primary{background:var(--crimson);color:var(--offwhite);flex:1 1 100%;font-weight:700;font-size:15px;padding:14px}
  .act.ghost{background:transparent;color:var(--crimson);border:1.5px solid var(--crimson);flex:1}

  .foot{
    text-align:center;font-family:'Space Mono',monospace;font-size:10px;
    letter-spacing:.15em;color:#8a8177;padding-top:2px;transition:color .3s;
  }
  .foot.saved{color:var(--crimson);font-weight:700}

  /* ---- staged reveal ---- */
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .main > *{animation:fadeUp .5s cubic-bezier(.2,.8,.3,1) backwards}
  .main > :nth-child(1){animation-delay:.4s}
  .main > :nth-child(2){animation-delay:.5s}
  .main > :nth-child(3){animation-delay:.6s}
  .main > :nth-child(4){animation-delay:.75s}
  .main > :nth-child(5){animation-delay:.9s}
  .btnrow,.foot{animation:fadeUp .5s cubic-bezier(.2,.8,.3,1) 1.1s backwards}

  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01s !important;animation-delay:0s !important}
  }
</style>
</head>
